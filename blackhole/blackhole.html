<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黑洞模擬器 — Black Hole Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;background:#020308;font-family:'Noto Sans TC',sans-serif;color:#c8d2e0;overflow:hidden}
canvas{position:fixed;inset:0;display:block;cursor:ns-resize}
.hud{position:fixed;top:22px;left:26px;pointer-events:none;z-index:2}
.hud h1{font-size:15px;letter-spacing:.4em;font-weight:500;color:#eef2f8;margin:0}
.hud .sub{font-size:10.5px;letter-spacing:.24em;color:#5f6b7d;margin-top:4px}
.stats{margin-top:16px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#8fa0b8;line-height:1.95;white-space:pre}
.stats b{color:#e8a44c;font-weight:500}
.hint{position:fixed;bottom:14px;left:26px;font-size:11px;letter-spacing:.12em;color:#4c5666;z-index:2;pointer-events:none}
.panel{position:fixed;top:20px;right:20px;width:296px;background:rgba(10,14,22,.74);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(130,160,210,.14);border-radius:14px;padding:18px 18px 14px;max-height:calc(100vh - 40px);overflow-y:auto;z-index:3}
.tabs{display:flex;gap:6px;margin-bottom:6px}
.tab{flex:1;text-align:center;font-size:12.5px;padding:8px 0;border-radius:8px;border:1px solid rgba(130,160,210,.16);color:#8fa0b8;cursor:pointer;user-select:none;transition:.15s}
.tab.on{background:rgba(232,164,76,.13);color:#f0e2c8;border-color:rgba(232,164,76,.45)}
.sec{font-size:10.5px;letter-spacing:.28em;color:#5f6b7d;margin:16px 0 9px}
.row{display:flex;align-items:center;gap:10px;margin:0 0 9px;font-size:12px}
.row label{width:74px;flex:none;color:#93a2b8}
.row input[type=range]{flex:1;accent-color:#e8a44c;height:3px;cursor:pointer}
.row output{width:60px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#e6ecf5}
.chk{display:flex;align-items:center;gap:9px;font-size:12px;color:#93a2b8;margin:0 0 9px;cursor:pointer;user-select:none}
.chk input{accent-color:#e8a44c;cursor:pointer}
.btns{display:flex;gap:8px;margin-top:14px}
button{flex:1;background:rgba(232,164,76,.08);border:1px solid rgba(232,164,76,.3);color:#f0e2c8;font:500 12.5px 'Noto Sans TC',sans-serif;padding:8px 0;border-radius:8px;cursor:pointer;transition:.15s}
button:hover{background:rgba(232,164,76,.18)}
button:focus-visible,.tab:focus-visible{outline:2px solid #e8a44c;outline-offset:2px}
.hidden{display:none}
.note{font-size:10.5px;color:#4c5666;margin-top:12px;line-height:1.7}
@media (max-width:680px){
 .panel{left:10px;right:10px;top:auto;bottom:10px;width:auto;max-height:44vh}
 .hud{top:14px;left:16px}.hint{display:none}
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<header class="hud">
  <h1>黑洞模擬器</h1>
  <div class="sub">RELATIVISTIC ACCRETION · TOY MODEL</div>
  <div class="stats" id="stats"></div>
</header>
<div class="hint">拖曳畫面可調整傾角 ・ 空白鍵暫停</div>

<aside class="panel" aria-label="控制面板">
  <div class="tabs" role="tablist">
    <div class="tab on" id="tab-s" role="tab" tabindex="0">單一黑洞</div>
    <div class="tab" id="tab-b" role="tab" tabindex="0">雙黑洞合併</div>
  </div>

  <div class="sec">共同參數</div>
  <div class="row"><label for="inc">傾角</label><input type="range" id="inc" min="0" max="88" step="1" value="68"><output id="inc-v"></output></div>
  <div class="row"><label for="spd">時間流速</label><input type="range" id="spd" min="0" max="3" step="0.05" value="1"><output id="spd-v"></output></div>
  <div class="row"><label for="dop">都卜勒集束</label><input type="range" id="dop" min="0" max="1" step="0.05" value="0.7"><output id="dop-v"></output></div>
  <div class="row"><label for="lens">重力透鏡</label><input type="range" id="lens" min="0" max="1" step="0.05" value="0.85"><output id="lens-v"></output></div>
  <div class="row"><label for="tmp">盤面溫度</label><input type="range" id="tmp" min="3000" max="15000" step="100" value="6800"><output id="tmp-v"></output></div>

  <div id="g-single">
    <div class="sec">單一黑洞</div>
    <div class="row"><label for="rout">吸積盤半徑</label><input type="range" id="rout" min="4" max="14" step="0.5" value="9"><output id="rout-v"></output></div>
    <div class="row"><label for="num">粒子密度</label><input type="range" id="num" min="600" max="5000" step="100" value="2800"><output id="num-v"></output></div>
  </div>

  <div id="g-binary" class="hidden">
    <div class="sec">雙黑洞系統</div>
    <div class="row"><label for="q">質量比 q</label><input type="range" id="q" min="0.3" max="1" step="0.05" value="0.8"><output id="q-v"></output></div>
    <div class="row"><label for="a0">初始間距</label><input type="range" id="a0" min="8" max="20" step="0.5" value="14"><output id="a0-v"></output></div>
    <div class="row"><label for="rate">旋近速率</label><input type="range" id="rate" min="0" max="1" step="0.05" value="0.35"><output id="rate-v"></output></div>
    <label class="chk"><input type="checkbox" id="ripples" checked>重力波漣漪</label>
    <label class="chk"><input type="checkbox" id="grid" checked>時空網格</label>
  </div>

  <div class="btns">
    <button id="pause">暫停</button>
    <button id="reset" class="hidden">重置系統</button>
  </div>
  <div class="note" id="modenote">內側物質以克卜勒速度公轉，接近你的一側因相對論性集束而增亮偏藍。</div>
</aside>

<script>
'use strict';
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){DPR=Math.min(window.devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
resize();addEventListener('resize',resize);

const TAU=Math.PI*2;
const C={mode:'single',inc:68,spd:1,dop:0.7,lens:0.85,tmp:6800,rout:9,num:2800,q:0.8,a0:14,rate:0.35,ripples:true,grid:true};

const stars=[];for(let i=0;i<280;i++)stars.push([Math.random(),Math.random(),Math.random()*1.4+0.3,Math.random()*0.5+0.12]);

function bb(t){t/=100;let r,g,b;
r=t<=66?255:329.7*Math.pow(t-60,-0.1332);
g=t<=66?99.47*Math.log(t)-161.1:288.1*Math.pow(t-60,-0.0755);
b=t>=66?255:(t<=19?0:138.5*Math.log(t-10)-305.04);
return[Math.max(0,Math.min(255,r)),Math.max(0,Math.min(255,g)),Math.max(0,Math.min(255,b))];}

/* ---------- single mode ---------- */
const MAXN=5000;
const sr=new Float32Array(MAXN),sp=new Float32Array(MAXN),sj=new Float32Array(MAXN);
function seedSingle(){for(let i=0;i<MAXN;i++){const u=Math.random();sr[i]=2.6+(C.rout-2.6)*Math.pow(u,1.6);sp[i]=Math.random()*TAU;sj[i]=0.55+Math.random()*0.9;}}
seedSingle();

/* ---------- binary mode ---------- */
const B={};
function mkDisk(R){const n=1050,d={r:new Float32Array(n),p:new Float32Array(n),j:new Float32Array(n),n:n};
for(let i=0;i<n;i++){d.r[i]=R*(2.3+3.4*Math.pow(Math.random(),1.5));d.p[i]=Math.random()*TAU;d.j[i]=0.5+Math.random();}return d;}
function resetBinary(){
 B.phase='inspiral';B.a=C.a0;B.th=0;B.m1=1;B.m2=C.q;B.M=1+C.q;B.R1=1;B.R2=C.q;
 B.rem=null;B.rk=null;B.flash=0;B.rd=0;B.rip=[];B.emitT=0.3;
 B.d1=mkDisk(B.R1);B.d2=mkDisk(B.R2);
 B.cb=[];for(let i=0;i<650;i++)B.cb.push({r:C.a0*(1.15+Math.random()*0.8),p:Math.random()*TAU,j:0.4+Math.random()});
}
resetBinary();
function posBH(){
 const c=Math.cos(B.th),s=Math.sin(B.th),r1=B.a*B.m2/B.M,r2=B.a*B.m1/B.M;
 return{x1:c*r1,z1:s*r1,x2:-c*r2,z2:-s*r2,r1:r1,r2:r2};
}
function doMerge(){
 const P=posBH();
 B.phase='ringdown';B.rd=0;B.flash=1;
 const Mr=B.M*0.95;B.rem={R:Mr,m:Mr};
 const tot=B.d1.n+B.d2.n;
 B.rk={cr:new Float32Array(tot),tr:new Float32Array(tot),p:new Float32Array(tot),j:new Float32Array(tot),n:tot};
 let k=0;
 const src=[[B.d1,P.x1,P.z1],[B.d2,P.x2,P.z2]];
 for(const[d,bx,bz]of src){for(let i=0;i<d.n;i++){
  const wx=bx+Math.cos(d.p[i])*d.r[i],wz=bz+Math.sin(d.p[i])*d.r[i];
  const rr=Math.hypot(wx,wz);
  B.rk.cr[k]=Math.max(rr,1.5*Mr);
  B.rk.tr[k]=Math.min(Math.max(rr,2.3*Mr),7.2*Mr)+Math.random()*0.6;
  B.rk.p[k]=Math.atan2(wz,wx);B.rk.j[k]=d.j[i];k++;}}
 for(let i=0;i<3;i++)B.rip.push({r:B.R1+B.R2+i*1.6,eps:0.2,ph:B.th,amp:11-i*2});
}

/* ---------- stepping ---------- */
let paused=false;
if(matchMedia('(prefers-reduced-motion: reduce)').matches)paused=true;
function stepSingle(dt){const n=C.num;for(let i=0;i<n;i++)sp[i]+=dt*C.spd*2.2/Math.pow(sr[i],1.5);}
function advDisk(d,m,dt){for(let i=0;i<d.n;i++)d.p[i]+=dt*C.spd*14*Math.sqrt(m)/Math.pow(d.r[i],1.5);}
function stepBinary(dt){
 for(const rp of B.rip)rp.r+=22*dt*Math.max(C.spd,0.2);
 B.rip=B.rip.filter(rp=>rp.amp/(rp.r*0.35+1)>0.006);
 for(const p of B.cb)p.p+=dt*C.spd*6*Math.sqrt(B.M)/Math.pow(p.r,1.5);
 if(B.flash>0)B.flash-=dt*1.1;
 if(B.phase==='inspiral'){
  const om=25*Math.sqrt(B.M/Math.pow(B.a,3))*C.spd;
  B.th+=om*dt;B.om=om;
  B.a-=C.rate*480*(B.m1*B.m2*B.M)/Math.pow(B.a,3)*dt*C.spd;
  advDisk(B.d1,B.m1,dt);advDisk(B.d2,B.m2,dt);
  B.emitT-=dt*C.spd;
  if(B.emitT<=0&&C.ripples){
   B.rip.push({r:B.a*0.6,eps:0.16,ph:B.th,amp:(B.m1*B.m2/(B.a*B.a))*140});
   B.emitT=Math.max(0.12,0.55*Math.pow(B.a/C.a0,1.2));}
  if(B.a<=(B.R1+B.R2)*1.15)doMerge();
 }else{
  B.rd+=dt;
  if(B.phase==='ringdown'&&B.rd>4)B.phase='remnant';
  const d=B.rk,Mr=B.rem.m,e=Math.min(1,dt*0.8);
  for(let i=0;i<d.n;i++){
   d.cr[i]+=(d.tr[i]-d.cr[i])*e;
   d.p[i]+=dt*C.spd*14*Math.sqrt(Mr)/Math.pow(d.cr[i],1.5);}
 }
}

/* ---------- rendering ---------- */
function drawStars(){ctx.globalCompositeOperation='source-over';ctx.fillStyle='#020308';ctx.fillRect(0,0,W,H);
ctx.fillStyle='rgba(255,255,255,0.85)';
for(const st of stars){ctx.globalAlpha=st[3];ctx.fillRect(st[0]*W,st[1]*H,st[2],st[2]);}ctx.globalAlpha=1;}

function drawSingle(){
 drawStars();
 const cx=W/2,cy=H/2,S=Math.min(W,H)*0.1;
 const inc=C.inc*Math.PI/180,sI=Math.sin(inc),cI=Math.cos(inc);
 const col=bb(C.tmp),br=col[0],bg=col[1],bv=col[2];
 ctx.globalCompositeOperation='lighter';
 ctx.lineWidth=1.6;ctx.strokeStyle='rgba('+(br|0)+','+(bg|0)+','+(bv|0)+',0.45)';
 ctx.beginPath();ctx.arc(cx,cy,S*1.02,0,TAU);ctx.stroke();
 ctx.lineWidth=4;ctx.strokeStyle='rgba('+(br|0)+','+(bg|0)+','+(bv|0)+',0.1)';
 ctx.beginPath();ctx.arc(cx,cy,S*1.1,0,TAU);ctx.stroke();
 const spdK=0.35+0.65*Math.min(C.spd,2)/2,n=C.num;
 for(let i=0;i<n;i++){
  const r=sr[i],ph=sp[i],c=Math.cos(ph),s=Math.sin(ph);
  const x=c*r,g=Math.exp(-(x*x)/(r*r*0.72));
  const lift=C.lens*sI*Math.max(0,s)*1.55*g;
  const yU=s*r*cI+lift,dd=Math.sqrt(x*x+yU*yU);
  if(s>0&&dd<1.04)continue;
  const beta=Math.min(0.68,0.55*Math.sqrt(2.6/r))*spdK;
  const mu=C.dop*beta*c*sI,del=1/Math.max(0.25,1-mu);
  let lum=sj[i]*(6.5/(r*r))*del*del*del;if(lum>3)lum=3;
  let R=br,G=bg,Bc=bv,tt=Math.max(-1,Math.min(1,mu*2.4));
  if(tt>0){R+=(255-R)*tt*0.7;G+=(255-G)*tt*0.5;Bc+=(255-Bc)*tt*0.9;}
  else{const k=-tt;G*=1-0.55*k;Bc*=1-0.8*k;}
  const a=Math.min(1,lum);if(a<0.02)continue;
  const sx=cx+x*S,sy=cy-yU*S;
  ctx.fillStyle='rgba('+(R|0)+','+(G|0)+','+(Bc|0)+','+a.toFixed(3)+')';
  ctx.fillRect(sx-0.9,sy-0.9,1.8,1.8);
  ctx.fillStyle='rgba('+(R|0)+','+(G|0)+','+(Bc|0)+','+(a*0.22).toFixed(3)+')';
  ctx.fillRect(sx-2.3,sy-2.3,4.6,4.6);
  if(s>0&&g>0.15&&sI>0.3&&C.lens>0.05){
   const y2=-(1.07+0.22*lift),d2=Math.sqrt(x*x*g*g+y2*y2);
   if(d2>1.04){ctx.fillStyle='rgba('+(R|0)+','+(G|0)+','+(Bc|0)+','+(a*0.28).toFixed(3)+')';
   ctx.fillRect(cx+x*g*S-0.8,cy-y2*S-0.8,1.6,1.6);}}}
 ctx.globalCompositeOperation='source-over';
}

function proj(px,pz,lift,cx,cy,U,cI){return[cx+px*U,cy-(pz*cI+lift)*U];}

function drawGrid(masses,cx,cy,U,cI){
 const E=C.a0*1.4,N=24,st=2*E/N;
 ctx.globalCompositeOperation='source-over';
 ctx.strokeStyle='rgba(96,140,220,0.13)';ctx.lineWidth=1;
 function disp(px,pz){let dx=0,dz=0;
  for(const b of masses){const ax=b.x-px,az=b.z-pz;const d=Math.hypot(ax,az)+0.001;
   const f=b.m*2.4/((d+1.2)*(d+1.2))*Math.min(d,2);dx+=ax/d*f;dz+=az/d*f;}
  return[px+dx,pz+dz];}
 for(let i=0;i<=N;i++){ctx.beginPath();
  for(let j=0;j<=N;j++){const[wx,wz]=disp(-E+j*st,-E+i*st);const[sx,sy]=proj(wx,wz,0,cx,cy,U,cI);
   j===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);}ctx.stroke();}
 for(let j=0;j<=N;j++){ctx.beginPath();
  for(let i=0;i<=N;i++){const[wx,wz]=disp(-E+j*st,-E+i*st);const[sx,sy]=proj(wx,wz,0,cx,cy,U,cI);
   i===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);}ctx.stroke();}
}

function drawRipples(cx,cy,U,cI){
 ctx.globalCompositeOperation='lighter';ctx.lineWidth=1.2;
 for(const rp of B.rip){
  const al=Math.min(0.5,rp.amp/(rp.r*0.35+1));if(al<0.006)continue;
  ctx.strokeStyle='rgba(150,180,255,'+al.toFixed(3)+')';
  ctx.beginPath();
  for(let k=0;k<=64;k++){const t=k/64*TAU;
   const R=rp.r*(1+rp.eps*Math.cos(2*t-2*rp.ph));
   const[sx,sy]=proj(Math.cos(t)*R,Math.sin(t)*R,0,cx,cy,U,cI);
   k===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);}
  ctx.closePath();ctx.stroke();}
}

function drawShadow(bx,bz,R,rf,cx,cy,U,cI,col){
 const[sx,sy]=proj(bx,bz,0,cx,cy,U,cI);
 ctx.globalCompositeOperation='source-over';
 ctx.fillStyle='#000';ctx.beginPath();ctx.arc(sx,sy,R*U,0,TAU);ctx.fill();
 ctx.globalCompositeOperation='lighter';
 ctx.lineWidth=1.4;ctx.strokeStyle='rgba('+(col[0]|0)+','+(col[1]|0)+','+(col[2]|0)+',0.45)';
 ctx.beginPath();ctx.arc(sx,sy,R*U*1.04*rf,0,TAU);ctx.stroke();
 ctx.lineWidth=3.5;ctx.strokeStyle='rgba('+(col[0]|0)+','+(col[1]|0)+','+(col[2]|0)+',0.1)';
 ctx.beginPath();ctx.arc(sx,sy,R*U*1.12*rf,0,TAU);ctx.stroke();
}

function drawDisk(d,bx,bz,R,m,betaz,rmax,cx,cy,U,cI,sI,col,spdK){
 ctx.globalCompositeOperation='lighter';
 const br=col[0],bg=col[1],bv=col[2];
 for(let i=0;i<d.n;i++){
  const rl=d.r[i];
  let fade=1;
  if(rmax>0&&rl>rmax){fade=1-(rl-rmax)/(0.9*R+0.4);if(fade<=0.03)continue;}
  const pl=d.p[i],c=Math.cos(pl),s=Math.sin(pl);
  const px=bx+c*rl,pz=bz+s*rl;
  const g=Math.exp(-(c*c)/0.7);
  const lift=C.lens*sI*Math.max(0,s)*1.3*R*g;
  const zrel=s*rl;
  if(zrel>0&&Math.hypot(c*rl,zrel*cI+lift)<R*1.05)continue;
  const rho=rl/R;
  const betaL=Math.min(0.65,0.5*Math.sqrt(2.3/rho))*spdK;
  const mu=C.dop*(betaL*c+betaz)*sI,del=1/Math.max(0.25,1-mu);
  let lum=d.j[i]*(6.3/(rho*rho))*del*del*del*fade;if(lum>3)lum=3;
  let Rr=br,G=bg,Bc=bv,tt=Math.max(-1,Math.min(1,mu*2.4));
  if(tt>0){Rr+=(255-Rr)*tt*0.7;G+=(255-G)*tt*0.5;Bc+=(255-Bc)*tt*0.9;}
  else{const k=-tt;G*=1-0.55*k;Bc*=1-0.8*k;}
  const a=Math.min(1,lum);if(a<0.02)continue;
  const[sx,sy]=proj(px,pz,lift,cx,cy,U,cI);
  ctx.fillStyle='rgba('+(Rr|0)+','+(G|0)+','+(Bc|0)+','+a.toFixed(3)+')';
  ctx.fillRect(sx-0.9,sy-0.9,1.8,1.8);
  ctx.fillStyle='rgba('+(Rr|0)+','+(G|0)+','+(Bc|0)+','+(a*0.2).toFixed(3)+')';
  ctx.fillRect(sx-2.2,sy-2.2,4.4,4.4);}
}

function drawBinary(){
 drawStars();
 const cx=W/2,cy=H/2,U=Math.min(W,H)*0.8/(C.a0+12);
 const inc=C.inc*Math.PI/180,sI=Math.sin(inc),cI=Math.cos(inc);
 const col=bb(C.tmp),colDim=[col[0]*0.7,col[1]*0.7,col[2]*0.85];
 const spdK=0.35+0.65*Math.min(C.spd,2)/2;
 const merged=B.phase!=='inspiral';
 const P=posBH();
 const masses=merged?[{x:0,z:0,m:B.rem.m}]:[{x:P.x1,z:P.z1,m:B.m1},{x:P.x2,z:P.z2,m:B.m2}];
 if(C.grid)drawGrid(masses,cx,cy,U,cI);
 drawRipples(cx,cy,U,cI);
 ctx.globalCompositeOperation='lighter';
 for(const p of B.cb){
  const c=Math.cos(p.p),s=Math.sin(p.p);
  const mu=C.dop*0.18*c*sI;
  let Rr=colDim[0],G=colDim[1],Bc=colDim[2];
  if(mu>0){Rr+=(255-Rr)*mu;Bc+=(255-Bc)*mu*1.4;}else{G*=1+mu*0.8;Bc*=1+mu;}
  const a=p.j*0.22*(1+mu*2);if(a<0.01)continue;
  const[sx,sy]=proj(c*p.r,s*p.r,0,cx,cy,U,cI);
  ctx.fillStyle='rgba('+(Rr|0)+','+(G|0)+','+(Bc|0)+','+Math.min(0.6,a).toFixed(3)+')';
  ctx.fillRect(sx-0.8,sy-0.8,1.6,1.6);}
 if(!merged){
  const vfac=0.9*Math.sqrt(B.M/B.a),ct=Math.cos(B.th);
  const b1={d:B.d1,x:P.x1,z:P.z1,R:B.R1,m:B.m1,bz:Math.min(0.45,vfac*B.m2/B.M)*ct};
  const b2={d:B.d2,x:P.x2,z:P.z2,R:B.R2,m:B.m2,bz:-Math.min(0.45,vfac*B.m1/B.M)*ct};
  const rmax=0.45*B.a;
  const order=b1.z>b2.z?[b1,b2]:[b2,b1];
  for(const b of order){
   drawShadow(b.x,b.z,b.R,1,cx,cy,U,cI,col);
   drawDisk(b.d,b.x,b.z,b.R,b.m,b.bz,rmax,cx,cy,U,cI,sI,col,spdK);}
 }else{
  const rf=1+0.16*Math.exp(-B.rd*1.4)*Math.cos(B.rd*10);
  drawShadow(0,0,B.rem.R,rf,cx,cy,U,cI,col);
  const d=B.rk;
  ctx.globalCompositeOperation='lighter';
  for(let i=0;i<d.n;i++){
   const rl=d.cr[i],pl=d.p[i],c=Math.cos(pl),s=Math.sin(pl);
   const g=Math.exp(-(c*c)/0.7);
   const lift=C.lens*sI*Math.max(0,s)*1.3*B.rem.R*g;
   if(s>0&&Math.hypot(c*rl,s*rl*cI+lift)<B.rem.R*1.05)continue;
   const rho=rl/B.rem.R;
   const betaL=Math.min(0.65,0.5*Math.sqrt(2.3/rho))*spdK;
   const mu=C.dop*betaL*c*sI,del=1/Math.max(0.25,1-mu);
   let lum=d.j[i]*(6.3/(rho*rho))*del*del*del;if(lum>3)lum=3;
   let Rr=col[0],G=col[1],Bc=col[2],tt=Math.max(-1,Math.min(1,mu*2.4));
   if(tt>0){Rr+=(255-Rr)*tt*0.7;G+=(255-G)*tt*0.5;Bc+=(255-Bc)*tt*0.9;}
   else{const k=-tt;G*=1-0.55*k;Bc*=1-0.8*k;}
   const a=Math.min(1,lum);if(a<0.02)continue;
   const[sx,sy]=proj(c*rl,s*rl,lift,cx,cy,U,cI);
   ctx.fillStyle='rgba('+(Rr|0)+','+(G|0)+','+(Bc|0)+','+a.toFixed(3)+')';
   ctx.fillRect(sx-0.9,sy-0.9,1.8,1.8);
   ctx.fillStyle='rgba('+(Rr|0)+','+(G|0)+','+(Bc|0)+','+(a*0.2).toFixed(3)+')';
   ctx.fillRect(sx-2.2,sy-2.2,4.4,4.4);}
  if(B.flash>0){
   const fr=(1-B.flash)*C.a0*0.9*U+B.rem.R*U;
   ctx.fillStyle='rgba(255,235,205,'+(B.flash*0.45).toFixed(3)+')';
   ctx.beginPath();ctx.arc(cx,cy,fr,0,TAU);ctx.fill();}
 }
 ctx.globalCompositeOperation='source-over';
}

/* ---------- stats ---------- */
const statsEl=document.getElementById('stats');
let statT=0;
function updStats(dt){
 statT-=dt;if(statT>0)return;statT=0.15;
 if(C.mode==='single'){
  statsEl.innerHTML='模式      單一黑洞\n盤內緣    2.6 <b>R\u209B</b>\n傾角      '+Math.round(C.inc)+'\u00B0';
 }else if(B.phase==='inspiral'){
  statsEl.innerHTML='相位      <b>旋近</b>\n間距      '+B.a.toFixed(2)+' R\u209B\n軌道頻率  '+((B.om||0)/TAU).toFixed(2)+' Hz\n重力波    2f = '+(2*(B.om||0)/TAU).toFixed(2)+' Hz';
 }else{
  statsEl.innerHTML='相位      <b>'+(B.phase==='ringdown'?'鈴宕':'穩定殘骸')+'</b>\n殘骸質量  '+(B.rem.m).toFixed(2)+' M\u2081\n輻射質量  5.0 %';
 }
}

/* ---------- loop ---------- */
let last=0;
function frame(t){requestAnimationFrame(frame);
 const dt=Math.min((t-last)/1000,0.05);last=t;
 if(!paused){C.mode==='single'?stepSingle(dt):stepBinary(dt);}
 C.mode==='single'?drawSingle():drawBinary();
 updStats(dt);}
requestAnimationFrame(frame);

/* ---------- UI ---------- */
function bind(id,key,fmt,cb){const el=document.getElementById(id),out=document.getElementById(id+'-v');
 const u=()=>{C[key]=parseFloat(el.value);out.textContent=fmt(C[key]);if(cb)cb();};
 el.addEventListener('input',u);out.textContent=fmt(C[key]);}
bind('inc','inc',v=>Math.round(v)+'\u00B0');
bind('spd','spd',v=>v.toFixed(2)+'\u00D7');
bind('dop','dop',v=>v.toFixed(2));
bind('lens','lens',v=>v.toFixed(2));
bind('tmp','tmp',v=>Math.round(v).toLocaleString()+' K');
bind('rout','rout',v=>v.toFixed(1)+' Rs',seedSingle);
bind('num','num',v=>String(Math.round(v)));
bind('q','q',v=>v.toFixed(2),resetBinary);
bind('a0','a0',v=>v.toFixed(1)+' Rs',resetBinary);
bind('rate','rate',v=>v.toFixed(2));
document.getElementById('ripples').addEventListener('change',e=>C.ripples=e.target.checked);
document.getElementById('grid').addEventListener('change',e=>C.grid=e.target.checked);

const tabS=document.getElementById('tab-s'),tabB=document.getElementById('tab-b');
const gS=document.getElementById('g-single'),gB=document.getElementById('g-binary');
const resetBtn=document.getElementById('reset'),note=document.getElementById('modenote');
function setMode(m){C.mode=m;
 tabS.classList.toggle('on',m==='single');tabB.classList.toggle('on',m==='binary');
 gS.classList.toggle('hidden',m!=='single');gB.classList.toggle('hidden',m!=='binary');
 resetBtn.classList.toggle('hidden',m!=='binary');
 note.textContent=m==='single'
  ?'內側物質以克卜勒速度公轉，接近你的一側因相對論性集束而增亮偏藍。'
  :'兩黑洞因重力波輻射損失能量而逐漸旋近，最終合併，經鈴宕後留下較輕的殘骸——差額質量以重力波形式輻射。';
 if(m==='binary')resetBinary();}
tabS.addEventListener('click',()=>setMode('single'));
tabB.addEventListener('click',()=>setMode('binary'));
tabS.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')setMode('single');});
tabB.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')setMode('binary');});

const pauseBtn=document.getElementById('pause');
function togglePause(){paused=!paused;pauseBtn.textContent=paused?'播放':'暫停';}
pauseBtn.addEventListener('click',togglePause);
resetBtn.addEventListener('click',resetBinary);
addEventListener('keydown',e=>{if(e.code==='Space'&&e.target.tagName!=='INPUT'&&e.target.tagName!=='BUTTON'){e.preventDefault();togglePause();}});

/* drag to tilt */
let drag=null;
cv.addEventListener('pointerdown',e=>{drag={y:e.clientY,inc:C.inc};cv.setPointerCapture(e.pointerId);});
cv.addEventListener('pointermove',e=>{if(!drag)return;
 C.inc=Math.max(0,Math.min(88,drag.inc+(e.clientY-drag.y)*0.25));
 const el=document.getElementById('inc');el.value=C.inc;
 document.getElementById('inc-v').textContent=Math.round(C.inc)+'\u00B0';});
cv.addEventListener('pointerup',()=>drag=null);
</script>
</body>
